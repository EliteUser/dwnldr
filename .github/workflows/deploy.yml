name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify project
        run: pnpm check

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DWNLDR_DEPLOY_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@213.165.55.245 '
          if [ ! -d "/usr/apps/dwnldr/.git" ]; then
            sudo git clone https://github.com/EliteUser/dwnldr.git /usr/apps/dwnldr
          fi
          cd /usr/apps/dwnldr
          sudo git pull origin master
          sudo docker build -t dwnldr .
          if sudo docker ps -aq -f name=^dwnldr$ | grep -q .; then
            sudo docker rm -f dwnldr
          fi
          sudo mkdir -p /usr/apps/dwnldr/self-signed
          SERVER_IP=$(hostname -I | awk "{print \$1}")
          sudo docker run -d \
            -p 80:80 \
            -p 443:443 \
            -e SERVER_IP="$SERVER_IP" \
            -v /usr/apps/dwnldr/self-signed:/var/lib/dwnldr/self-signed \
            -v /etc/letsencrypt:/etc/letsencrypt:ro \
            --restart always \
            --name dwnldr \
            dwnldr
          '
