name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify project
        run: pnpm check

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DWNLDR_DEPLOY_KEY }}

      - name: Deploy to VPS
        env:
          DWNLDR_DEPLOY_HOST: ${{ secrets.DWNLDR_DEPLOY_HOST || vars.DWNLDR_DEPLOY_HOST }}
          DWNLDR_PUBLIC_IP: ${{ secrets.DWNLDR_PUBLIC_IP || vars.DWNLDR_PUBLIC_IP || secrets.DWNLDR_DEPLOY_HOST || vars.DWNLDR_DEPLOY_HOST }}
        run: |
          if [ -z "$DWNLDR_DEPLOY_HOST" ]; then
            echo "DWNLDR_DEPLOY_HOST is not configured. Add it as a GitHub Actions variable or secret."
            exit 1
          fi
          if [ -z "$DWNLDR_PUBLIC_IP" ]; then
            echo "DWNLDR_PUBLIC_IP is not configured. Add it as a GitHub Actions variable or secret."
            exit 1
          fi

          ssh -o StrictHostKeyChecking=no root@"$DWNLDR_DEPLOY_HOST" '
          if [ ! -d "/usr/apps/dwnldr/.git" ]; then
            sudo git clone https://github.com/EliteUser/dwnldr.git /usr/apps/dwnldr
          fi
          cd /usr/apps/dwnldr
          sudo git pull origin master
          sudo docker build -t dwnldr .
          if sudo docker ps -aq -f name=^dwnldr$ | grep -q .; then
            sudo docker rm -f dwnldr
          fi
          sudo docker run -d \
            -p 80:80 \
            -p 443:443 \
            -e LETSENCRYPT_ENABLED=true \
            -e SERVER_IP='"$DWNLDR_PUBLIC_IP"' \
            -e ALLOW_SELF_SIGNED_SSL=false \
            -v dwnldr-letsencrypt:/etc/letsencrypt \
            -v dwnldr-state:/var/lib/dwnldr \
            --restart always \
            --name dwnldr \
            dwnldr
          '
